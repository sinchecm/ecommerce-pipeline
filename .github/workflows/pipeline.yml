name: TheLook eCommerce Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/**'

  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip dashboard deployment'
        type: boolean
        default: false

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Run the full ELT pipeline ────────────────────────
  run-pipeline:
    name: Run Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p data/raw data/warehouse logs reports

      - name: Run Data Ingestion
        run: python3 scripts/ingestion/generate_thelook_data.py
        timeout-minutes: 10

      - name: Run ELT Transformations
        run: python3 scripts/transformations/elt_pipeline.py
        timeout-minutes: 5

      - name: Run Data Quality Tests
        run: python3 scripts/quality/data_quality_tests.py
        timeout-minutes: 3

      - name: Run EDA Analysis
        run: python3 scripts/analysis/eda_analysis.py
        timeout-minutes: 5

      - name: Export Dashboard Data
        run: python3 scripts/export/export_dashboard_data.py
        timeout-minutes: 2

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-report-${{ github.run_id }}
          path: reports/quality_report.json
          retention-days: 30

      - name: Upload analysis charts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-charts-${{ github.run_id }}
          path: reports/*.png
          retention-days: 30

      - name: Upload dashboard data
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-data-${{ github.run_id }}
          path: |
            reports/insights.json
            dashboard/public/data/dashboard_data.json
          retention-days: 30

      - name: Quality gate check
        run: |
          python3 - <<'PYEOF'
          import json, sys
          with open('reports/quality_report.json') as f:
              report = json.load(f)
          summary = report['summary']
          print(f"Quality Gate: {summary['passed']}/{summary['total']} tests passed")
          if summary['critical_failures'] > 0:
              print(f"FAILED: {summary['critical_failures']} critical test(s) failed!")
              sys.exit(1)
          else:
              print("All tests passed!")
          PYEOF

      - name: Commit updated dashboard data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dashboard/public/data/dashboard_data.json reports/insights.json || true
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push || true

  # ── Job 2: Deploy Dashboard to Cloudflare Pages ─────────────
  deploy-dashboard:
    name: Deploy Dashboard
    needs: run-pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.skip_deploy != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dashboard data
        uses: actions/download-artifact@v4
        with:
          name: dashboard-data-${{ github.run_id }}
          path: ./artifacts

      - name: Copy fresh dashboard data
        run: |
          mkdir -p dashboard/public/data
          cp artifacts/dashboard_data.json dashboard/public/data/dashboard_data.json 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name thelook-dashboard --branch main
          workingDirectory: dashboard

  # ── Job 3: Summary ───────────────────────────────────────────
  notify:
    name: Pipeline Summary
    needs: [run-pipeline, deploy-dashboard]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print pipeline summary
        env:
          PIPELINE_RESULT: ${{ needs.run-pipeline.result }}
          DEPLOY_RESULT: ${{ needs.deploy-dashboard.result }}
          TRIGGER: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "## Pipeline Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Pipeline     | $PIPELINE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Dashboard | $DEPLOY_RESULT   |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** $TRIGGER" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** $RUN_ID" >> $GITHUB_STEP_SUMMARY

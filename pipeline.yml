name: TheLook eCommerce Pipeline

on:
  # Run on every push to main
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/**'

  # Daily at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      steps:
        description: 'Steps to run (leave empty for all)'
        required: false
        default: ''
      skip_deploy:
        description: 'Skip dashboard deployment'
        type: boolean
        default: false

# Cancel in-progress runs if a new one starts
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Run the full ELT pipeline ────────────────────────
  run-pipeline:
    name: Run Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/raw data/warehouse logs reports

      - name: Run Data Ingestion
        run: python3 scripts/ingestion/generate_thelook_data.py
        timeout-minutes: 10

      - name: Run ELT Transformations
        run: python3 scripts/transformations/elt_pipeline.py
        timeout-minutes: 5

      - name: Run Data Quality Tests
        run: python3 scripts/quality/data_quality_tests.py
        timeout-minutes: 3

      - name: Run EDA Analysis
        run: python3 scripts/analysis/eda_analysis.py
        timeout-minutes: 5

      - name: Export Dashboard Data
        run: python3 scripts/export/export_dashboard_data.py
        timeout-minutes: 2

      # ── Upload reports as downloadable artifacts ──
      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-report-${{ github.run_id }}
          path: reports/quality_report.json
          retention-days: 30

      - name: Upload analysis charts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-charts-${{ github.run_id }}
          path: reports/*.png
          retention-days: 30

      - name: Upload insights JSON
        uses: actions/upload-artifact@v4
        with:
          name: insights-${{ github.run_id }}
          path: |
            reports/insights.json
            dashboard/public/data/dashboard_data.json
          retention-days: 30

      # ── Check quality results and fail if tests failed ──
      - name: Assert quality gate
        run: |
          python3 - <<'EOF'
          import json, sys
          with open('reports/quality_report.json') as f:
              report = json.load(f)
          summary = report['summary']
          print(f"Quality Gate: {summary['passed']}/{summary['total']} tests passed")
          if summary['critical_failures'] > 0:
              print(f"❌ FAILED: {summary['critical_failures']} critical test(s) failed!")
              sys.exit(1)
          elif summary['failed'] > 0:
              print(f"⚠ WARNING: {summary['failed']} non-critical test(s) failed")
          else:
              print("✅ All tests passed!")
          EOF

      # ── Commit updated dashboard data back to repo ──
      - name: Commit dashboard data update
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add dashboard/public/data/dashboard_data.json reports/insights.json || true
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci] $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

  # ── Job 2: Deploy Dashboard to Cloudflare Pages ─────────────
  deploy-dashboard:
    name: Deploy Dashboard
    needs: run-pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && (github.event.inputs.skip_deploy != 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dashboard data artifact
        uses: actions/download-artifact@v4
        with:
          name: insights-${{ github.run_id }}
          path: ./artifacts

      - name: Copy fresh dashboard data
        run: |
          mkdir -p dashboard/public/data
          cp artifacts/dashboard_data.json dashboard/public/data/dashboard_data.json 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name thelook-dashboard --branch main
          workingDirectory: dashboard

  # ── Job 3: Pipeline health summary ──────────────────────────
  notify:
    name: Pipeline Summary
    needs: [run-pipeline, deploy-dashboard]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print pipeline summary
        run: |
          echo "## Pipeline Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Pipeline    | ${{ needs.run-pipeline.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Dashboard| ${{ needs.deploy-dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
